parameters:
- name: EnableAppSourceProcess
  type: boolean
  default: false

steps:
- checkout: self
- checkout: Shared

- task: PowerShell@2
  displayName: 'Update environment'
  inputs:
    targetType: filePath
    filePath: '$(Build.Repository.LocalPath)\$(Build.Repository.Name)\Build-Pipelines\scripts\UpdateEnv.ps1'
    arguments: '-aadTenantId $(aadTenantId) -newEnvironmentName $(newEnvironmentName) -environmentName $(environmentName)'
    failOnStderr: true
