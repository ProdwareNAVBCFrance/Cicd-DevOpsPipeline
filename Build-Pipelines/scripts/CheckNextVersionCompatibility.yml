
parameters:
- name: EnableAppSourceProcess
  type: boolean
  default: false

steps:
- checkout: self
- checkout: Shared

- task: PowerShell@2
  displayName: 'Prepare scripts for App Repo'
  inputs:
    targetType: 'inline'
    script: Copy-Item '$(Build.Repository.LocalPath)\Cicd-DevOpsPipeline\Build-Pipelines\scripts' -Destination '$(Build.Repository.LocalPath)\$(Build.Repository.Name)' -Recurse -Force

- task: PowerShell@2
  displayName: 'Set BuildNumber'
  inputs:
    targetType: filePath
    filePath: '$(Build.Repository.LocalPath)\$(Build.Repository.Name)\scripts\SetBuildNumber.ps1'
    arguments: '-appRevision $(Build.BuildID)'

- task: PowerShell@2
  displayName: 'Check Next Minor Version'
  env:
    LicenseFile: '$(LicenseFile)'
  inputs:
    targetType: filePath
    filePath: '$(Build.Repository.LocalPath)\$(Build.Repository.Name)\scripts\DevOps-Pipeline.ps1'
    arguments: '-environment "AzureDevOps" -version nextminorsaas -appBuild $(appBuild) -appRevision $(Build.BuildID) -AppSourceProcess:("${{ parameters.EnableAppSourceProcess }}" -eq "True")'
    failOnStderr: true

- task: PublishTestResults@2
  displayName: 'Publish Next Minor Test Results'
  condition: and(succeeded(),ne(variables['TestResults'],''))
  inputs:
    testResultsFormat: JUnit
    testResultsFiles: '$(Build.Repository.LocalPath)\$(Build.Repository.Name)\$(testResults)'
    failTaskOnFailedTests: true

- task: PowerShell@2
  displayName: 'Check Next Major Version'
  env:
    LicenseFile: '$(LicenseFile)'
  inputs:
    targetType: filePath
    filePath: '$(Build.Repository.LocalPath)\$(Build.Repository.Name)\scripts\DevOps-Pipeline.ps1'
    arguments: '-environment "AzureDevOps" -version nextmajorsaas -appBuild $(appBuild) -appRevision $(Build.BuildID) -AppSourceProcess:("${{ parameters.EnableAppSourceProcess }}" -eq "True")'
    failOnStderr: true

- task: PublishTestResults@2
  displayName: 'Publish Next Major Test Results'
  condition: and(succeeded(),ne(variables['TestResults'],''))
  inputs:
    testResultsFormat: JUnit
    testResultsFiles: '$(Build.Repository.LocalPath)\$(Build.Repository.Name)\$(testResults)'
    failTaskOnFailedTests: true

- task: PowerShell@2
  displayName: 'Cleanup'
  condition: always()
  inputs:
    targetType: filePath
    filePath: '$(Build.Repository.LocalPath)\$(Build.Repository.Name)\scripts\Cleanup.ps1'
    arguments: '-environment "AzureDevOps"'
    failOnStderr: false